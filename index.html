<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Fuck it's black</title>
		<style>
			html,
			body {
				height: 100%;
				margin: 0;
			}
			body {
				display: flex;
				align-items: center;
				justify-content: center;
				background: #000;
				transition: background-color 0.5s ease;
				font-family:
					system-ui,
					-apple-system,
					sans-serif;
			}
			body.white {
				background: #fff;
			}
			#toggle {
				cursor: pointer;
				padding: 28px 56px;
				font-size: 28px;
				font-weight: 600;
				border: none;
				border-radius: 12px;
				background: #fff;
				color: #000;
				transition:
					background-color 0.5s ease,
					color 0.5s ease;
			}
			body.white #toggle {
				background: #000;
				color: #fff;
			}
		</style>
	</head>
	<body>
		<button id="toggle">Fuck it's black</button>
		<script>
			const button = document.getElementById("toggle");
			button.addEventListener("click", () => {
				const isWhite = document.body.classList.toggle("white");
				button.textContent = isWhite ? "Fuck it's white" : "Fuck it's black";
			});
		</script>
	</body>
</html>
