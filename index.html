<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuck it's black</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      transition: background-color 0.6s ease;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    #toggle {
      padding: 28px 56px;
      font-size: 2rem;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      background: #fff;
      color: #000;
      transition: background-color 0.6s ease, color 0.6s ease;
    }
    body.light {
      background: #fff;
    }
    body.light #toggle {
      background: #000;
      color: #fff;
    }
  </style>
</head>
<body>
  <button id="toggle" type="button">Fuck it's black</button>
  <script>
    const body = document.body;
    const btn = document.getElementById("toggle");
    btn.addEventListener("click", () => {
      const light = body.classList.toggle("light");
      btn.textContent = light ? "Fuck it's white" : "Fuck it's black";
    });
  </script>
</body>
</html>
