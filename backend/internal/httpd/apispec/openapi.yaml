openapi: 3.1.0
info:
  description: Loopback-only HTTP surface served by the Go daemon. Generated from
    Go (code-first) — do not edit by hand; run `go generate ./...`.
  title: Agent Orchestrator HTTP daemon
  version: 0.1.0-route-shell
servers:
- description: Local daemon (loopback only)
  url: http://127.0.0.1:3001
paths:
  /api/v1/projects:
    get:
      operationId: listProjects
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProjectsResponse'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Internal Server Error
      summary: List all registered projects (active + degraded)
      tags:
      - projects
    post:
      operationId: addProject
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddInput'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Bad Request
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Internal Server Error
      summary: Register a new project from a git repository path
      tags:
      - projects
  /api/v1/projects/{id}:
    delete:
      operationId: removeProject
      parameters:
      - description: Project identifier (registry key).
        in: path
        name: id
        required: true
        schema:
          description: Project identifier (registry key).
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoveResult'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Internal Server Error
      summary: Remove a project; stops sessions, cleans workspaces, unregisters
      tags:
      - projects
    get:
      operationId: getProject
      parameters:
      - description: Project identifier (registry key).
        in: path
        name: id
        required: true
        schema:
          description: Project identifier (registry key).
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectGetResponse'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Internal Server Error
      summary: Fetch one project; discriminates ok vs degraded
      tags:
      - projects
    patch:
      operationId: updateProjectConfig
      parameters:
      - description: Project identifier (registry key).
        in: path
        name: id
        required: true
        schema:
          description: Project identifier (registry key).
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConfigInput'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Internal Server Error
      summary: Patch behaviour-only fields (identity is frozen)
      tags:
      - projects
  /api/v1/projects/{id}/repair:
    post:
      operationId: repairProject
      parameters:
      - description: Project identifier (registry key).
        in: path
        name: id
        required: true
        schema:
          description: Project identifier (registry key).
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Internal Server Error
      summary: Recover a degraded project where automatic repair is available
      tags:
      - projects
  /api/v1/projects/reload:
    post:
      operationId: reloadProjects
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReloadResult'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Internal Server Error
      summary: Invalidate cached config and re-scan the project registry
      tags:
      - projects
  /api/v1/sessions:
    get:
      operationId: listSessions
      parameters:
      - description: Optional project id filter.
        in: query
        name: project
        schema:
          description: Optional project id filter.
          type: string
      - description: Optional active/terminal filter.
        in: query
        name: active
        schema:
          description: Optional active/terminal filter.
          type:
          - "null"
          - boolean
      - description: When true, return only orchestrator sessions.
        in: query
        name: orchestratorOnly
        schema:
          description: When true, return only orchestrator sessions.
          type:
          - "null"
          - boolean
      - description: Optional freshness filter for dashboard reads.
        in: query
        name: fresh
        schema:
          description: Optional freshness filter for dashboard reads.
          type:
          - "null"
          - boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSessionsResponse'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Internal Server Error
      summary: List dashboard sessions
      tags:
      - sessions
    post:
      operationId: spawnSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpawnSessionRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Internal Server Error
      summary: Spawn a new session
      tags:
      - sessions
  /api/v1/sessions/{id}:
    get:
      operationId: getSession
      parameters:
      - description: Session identifier.
        in: path
        name: id
        required: true
        schema:
          description: Session identifier.
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Internal Server Error
      summary: Fetch one dashboard session
      tags:
      - sessions
  /api/v1/sessions/{id}/restore:
    post:
      operationId: restoreSession
      parameters:
      - description: Session identifier.
        in: path
        name: id
        required: true
        schema:
          description: Session identifier.
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Conflict
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Unprocessable Entity
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Internal Server Error
      summary: Restore a terminated session
      tags:
      - sessions
  /api/v1/sessions/{id}/send:
    post:
      operationId: sendSessionMessage
      parameters:
      - description: Session identifier.
        in: path
        name: id
        required: true
        schema:
          description: Session identifier.
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendSessionRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendSessionResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
          description: Internal Server Error
      summary: Send a message to a session
      tags:
      - sessions
components:
  schemas:
    APIError:
      properties:
        code:
          type: string
        details:
          additionalProperties: {}
          type: object
        error:
          type: string
        message:
          type: string
        requestId:
          type: string
      required:
      - error
      - code
      - message
      type: object
    Activity:
      properties:
        lastActivityAt:
          format: date-time
          type: string
        state:
          type: string
      required:
      - state
      - lastActivityAt
      type: object
    AddInput:
      properties:
        name:
          type:
          - "null"
          - string
        path:
          type: string
        projectId:
          type:
          - "null"
          - string
      required:
      - path
      type: object
    Degraded:
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
        resolveError:
          type: string
      required:
      - id
      - name
      - path
      - resolveError
      type: object
    ListProjectsResponse:
      properties:
        projects:
          items:
            $ref: '#/components/schemas/Summary'
          type: array
      required:
      - projects
      type: object
    ListSessionsResponse:
      properties:
        sessions:
          items:
            $ref: '#/components/schemas/Session'
          type: array
      required:
      - sessions
      type: object
    Project:
      properties:
        agent:
          type: string
        defaultBranch:
          type: string
        id:
          type: string
        name:
          type: string
        path:
          type: string
        repo:
          type: string
        scm:
          $ref: '#/components/schemas/SCMConfig'
        tracker:
          $ref: '#/components/schemas/TrackerConfig'
      required:
      - id
      - name
      - path
      - repo
      - defaultBranch
      type: object
    ProjectGetResponse:
      properties:
        project:
          $ref: '#/components/schemas/ProjectOrDegraded'
        status:
          enum:
          - ok
          - degraded
          type: string
      required:
      - status
      - project
      type: object
    ProjectOrDegraded:
      oneOf:
      - $ref: '#/components/schemas/Project'
      - $ref: '#/components/schemas/Degraded'
      type: object
    ProjectResponse:
      properties:
        project:
          $ref: '#/components/schemas/Project'
      required:
      - project
      type: object
    ReloadResult:
      properties:
        degradedCount:
          type: integer
        projectCount:
          type: integer
        reloaded:
          type: boolean
      required:
      - reloaded
      - projectCount
      - degradedCount
      type: object
    RemoveResult:
      properties:
        projectId:
          type: string
        removedStorageDir:
          type: boolean
      required:
      - projectId
      - removedStorageDir
      type: object
    SCMConfig:
      properties:
        package:
          type: string
        path:
          type: string
        plugin:
          type: string
        webhook:
          $ref: '#/components/schemas/SCMWebhookConfig'
      type: object
    SCMWebhookConfig:
      properties:
        deliveryHeader:
          type: string
        enabled:
          type:
          - "null"
          - boolean
        eventHeader:
          type: string
        maxBodyBytes:
          type: integer
        path:
          type: string
        secretEnvVar:
          type: string
        signatureHeader:
          type: string
      type: object
    SendSessionRequest:
      properties:
        message:
          description: Message to send to the session agent.
          type: string
      required:
      - message
      type: object
    SendSessionResponse:
      properties:
        message:
          type: string
        sessionId:
          type: string
      required:
      - sessionId
      - message
      type: object
    Session:
      properties:
        activity:
          $ref: '#/components/schemas/Activity'
        createdAt:
          format: date-time
          type: string
        harness:
          type: string
        id:
          type: string
        isTerminated:
          type: boolean
        issueId:
          type: string
        kind:
          type: string
        projectId:
          type: string
        status:
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
      - id
      - projectId
      - kind
      - activity
      - isTerminated
      - createdAt
      - updatedAt
      - status
      type: object
    SessionResponse:
      properties:
        session:
          $ref: '#/components/schemas/Session'
      required:
      - session
      type: object
    SpawnSessionRequest:
      properties:
        issueId:
          description: Optional tracker issue id.
          type: string
        projectId:
          description: Project that owns the session.
          type: string
        prompt:
          description: Initial prompt passed to the agent.
          type: string
      required:
      - projectId
      type: object
    Summary:
      properties:
        id:
          type: string
        name:
          type: string
        resolveError:
          type: string
        sessionPrefix:
          type: string
      required:
      - id
      - name
      - sessionPrefix
      type: object
    TrackerConfig:
      properties:
        package:
          type: string
        path:
          type: string
        plugin:
          type: string
      type: object
    UpdateConfigInput:
      properties:
        agent:
          type:
          - "null"
          - string
        scm:
          $ref: '#/components/schemas/SCMConfig'
        tracker:
          $ref: '#/components/schemas/TrackerConfig'
      type: object
tags:
- description: Project registry, configuration, and lifecycle administration
  name: projects
- description: Session lifecycle commands and dashboard read models
  name: sessions
