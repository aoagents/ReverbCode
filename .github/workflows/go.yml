name: Go

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/go.yml"

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Read the version from go.mod so CI can't drift from the module
          # (it previously pinned 1.22 while go.mod declared 1.25).
          go-version-file: backend/go.mod
          cache: false

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false

      - name: golangci-lint
        # v8 of the action drives golangci-lint v2 (the schema this config uses);
        # the v6 action speaks v1 CLI flags and errors against a v2 binary.
        uses: golangci/golangci-lint-action@v8
        with:
          # Pinned for reproducibility: bump intentionally rather than letting an
          # upstream release change CI. Must be built with Go >= the module's
          # (go.mod is 1.25); v2.12.2 is built with go1.25 — older v2 tags
          # (e.g. v2.1.x) are built with go1.24 and refuse to analyze 1.25 code.
          version: v2.12.2
          working-directory: backend
          # Blocking on the full ruleset: the tree is clean at zero findings, so
          # any new issue fails CI rather than being grandfathered.

  # gen-verify regenerates the code-first artifacts (openapi.yaml from Go, then
  # the frontend TS types from that spec) and fails if the committed copies are
  # stale — i.e. someone changed a Go contract type without running
  # `go generate ./...` + `npm run gen:api`.
  gen-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Generate OpenAPI from Go
        working-directory: backend
        run: go generate ./...

      - name: Generate TypeScript from OpenAPI
        working-directory: frontend
        run: |
          npm ci
          npm run gen:api

      - name: Fail on stale generated files
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated files are stale. Run 'go generate ./...' in backend and 'npm run gen:api' in frontend, then commit."
            exit 1
          fi
