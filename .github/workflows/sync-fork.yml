name: Sync fork from upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Sync yyovil/ReverbCode main from upstream
        run: gh repo sync yyovil/ReverbCode --branch main --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
